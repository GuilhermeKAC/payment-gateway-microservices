spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: payment-service
              uri: http://localhost:8081
              predicates:
                - Path=/v1/payments/**

            - id: merchant-service
              uri: http://localhost:8082
              predicates:
                - Path=/v1/merchants/**, /v1/customers/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info